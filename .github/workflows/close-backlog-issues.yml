name: Close Backlog Issues on Release

on:
  release:
    types: [published]

jobs:
  close-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Close Backlog issues
        env:
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          BACKLOG_SPACE_NAME: ${{ secrets.BACKLOG_SPACE_NAME }}
          BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
        run: npx tsx scripts/close-backlog-issues.ts
