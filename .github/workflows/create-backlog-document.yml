name: Create Backlog Document on Release

on:
  release:
    types: [published]

jobs:
  create-document:
    # Trigger only if release name starts with 'web-' or 'api-'
    if: startsWith(github.event.release.name, 'web-') || startsWith(github.event.release.name, 'api-')
    runs-on: ubuntu-latest
    env:
      BACKLOG_SPACE_NAME: ${{ secrets.BACKLOG_SPACE_NAME }}
      BACKLOG_API_KEY: ${{ secrets.BACKLOG_API_KEY }}
      BACKLOG_PROJECT_ID: ${{ secrets.BACKLOG_PROJECT_ID }}
    steps:
      - name: Extract Release Info
        id: extract
        env:
          RELEASE_TITLE: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # Extract issue keys and format as Markdown list
          KEYS=$(echo "$RELEASE_BODY" | grep -oE 'WORKNULAB-[0-9]+' | sort -u | sed 's/^/- /')

          if [ -z "$KEYS" ]; then
            KEYS="No related issues found."
          fi

          # Set parentId based on prefix
          if [[ "$RELEASE_TITLE" == api-* ]]; then
            PARENT_ID="019d8ac2226b7932883dd6d69c00d571"
          elif [[ "$RELEASE_TITLE" == web-* ]]; then
            PARENT_ID="019d8ac20c73759d97ba44b7e6b3a09b"
          fi

          # Output to GITHUB_OUTPUT using heredoc for multiline strings
          echo "keys<<EOF" >> "$GITHUB_OUTPUT"
          echo "$KEYS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"
          echo "parent_id=$PARENT_ID" >> "$GITHUB_OUTPUT"

      - name: Post to Backlog Document
        run: |
          DOC_TITLE="${{ steps.extract.outputs.title }}"
          PARENT_ID="${{ steps.extract.outputs.parent_id }}"

          # Build document body
          DOC_CONTENT=$(cat <<EOF
          # Release: ${{ steps.extract.outputs.title }}

          ## Related Issues
          ${{ steps.extract.outputs.keys }}

          EOF
          )

          # Execute API Request
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://${BACKLOG_SPACE_NAME}.backlog.com/api/v2/documents?apiKey=${BACKLOG_API_KEY}" \
            --data-urlencode "projectId=${BACKLOG_PROJECT_ID}" \
            --data-urlencode "title=${DOC_TITLE}" \
            --data-urlencode "content=${DOC_CONTENT}" \
            --data-urlencode "parentId=${PARENT_ID}" \
            --data-urlencode "emoji=🚀")

          if [ "$RESPONSE" != "201" ]; then
            echo "FAILED: Document creation returned status code $RESPONSE"
            exit 1
          else
            echo "SUCCESS: Document '${DOC_TITLE}' created under parent ID ${PARENT_ID}."
          fi
